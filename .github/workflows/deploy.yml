name: Birch Frontend

on:
  push:
    branches:
      - master

env:
  AWS_REGION: us-east-2
  ECR_REPO_URI: 018772930825.dkr.ecr.us-east-2.amazonaws.com/birch_frontend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Create .env file from secret
        run: echo "${{ secrets.BIRCH_FRONT_END_ENV }}" > .env

      - name: Build Docker image
        run: docker build -t $ECR_REPO_URI:latest .

      - name: Push Docker image to ECR
        run: docker push $ECR_REPO_URI:latest

      - name: Upload .env to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: ".env"
          target: "/home/ubuntu"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            aws ecr get-login-password --region us-east-2 | sudo docker login --username AWS --password-stdin 018772930825.dkr.ecr.us-east-2.amazonaws.com
            sudo docker pull 018772930825.dkr.ecr.us-east-2.amazonaws.com/birch_frontend:latest
            sudo docker stop birch_frontend || true
            sudo docker rm birch_frontend || true
            sudo docker run -d --name birch_frontend -p 5000:5000 \
              --env-file /home/ubuntu/.env \
              018772930825.dkr.ecr.us-east-2.amazonaws.com/birch_frontend:latest
            rm /home/ubuntu/.env
